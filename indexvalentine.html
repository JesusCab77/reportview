<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tengo una sorpresa 💌</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@0;1&display=swap" rel="stylesheet">

<style>
body{
  background: linear-gradient(180deg, #fdecef, #f9c5d1);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family: 'Playfair Display', serif;
  overflow:hidden;
  padding:20px;
}

/* Carta */
.envelope{
  background:#f6a5b8;
  width:100%;
  max-width:420px;
  padding:28px;
  border-radius:22px;
  text-align:center;
  box-shadow:0 25px 50px rgba(0,0,0,.25);
  position:relative;
  animation:float 4s ease-in-out infinite;
  z-index:2;
}

@keyframes float{
  0%{ transform:translateY(0); }
  50%{ transform:translateY(-8px); }
  100%{ transform:translateY(0); }
}

.letter{
  background:#fff7f0;
  padding:30px 22px;
  border-radius:16px;
  border:1px solid #f2c2cf;
}

.letter p{
  font-size:1.1rem;
  color:#7a2c40;
  margin-bottom:16px;
}

/* Corazón */
.heart{
  font-size:4rem;
  cursor:pointer;
  margin:20px 0;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.25)}
  100%{transform:scale(1)}
}

/* Firma */
.signature{
  font-size:0.95rem;
  color:#7a2c40;
}

/* Corazones flotando */
.heart-fall{
  position:absolute;
  top:-10px;
  animation:fall linear infinite;
  color:rgba(255,0,80,0.5);
  z-index:1;
  pointer-events:none;
}

@keyframes fall{
  to{ transform:translateY(110vh); }
}

/* Ajustes extra para pantallas muy pequeñas */
@media (max-width: 360px){
  .letter p{
    font-size:1rem;
  }
  .heart{
    font-size:3.5rem;
  }
}
</style>
</head>

<body>

<div class="envelope">
  <div class="letter">
    <p><em>Amor mío…</em></p>

    <p>
      Tengo algo muy especial para ti.<br>
      Algo que nace del corazón<br>
      y que solo tú puedes descubrir.
    </p>

    <p><strong>Toca el corazón 💖</strong></p>

    <div class="heart" onclick="abrir()">❤️</div>

    <hr>

    <div class="signature">
      De: <strong>Jesús</strong><br>
      Para: <strong>Shey</strong>
    </div>
  </div>
</div>

<script>
function abrir(){
  window.location.href = "valentine.html";
}

/* Lluvia suave de corazones */
function crearCorazon(){
  const h = document.createElement("div");
  h.classList.add("heart-fall");
  h.innerHTML = "❤️";
  h.style.left = Math.random()*100 + "vw";
  h.style.fontSize = Math.random()*20 + 14 + "px";
  h.style.animationDuration = Math.random()*3 + 4 + "s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),7000);
}
setInterval(crearCorazon, 600);
</script>

</body>
</html>
